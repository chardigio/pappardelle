# .pappardelle.yml — Example configuration
# Place this file at the root of your git repository.
# See pappardelle-config.md for full documentation of all options.
version: 1

# Default profile used when no keyword match is found
default_profile: backend

# Team prefix for Linear issues (e.g., 'ENG' for 'ENG-123')
team_prefix: ENG

# Claude configuration (optional)
# Defines how Claude Code is launched when opening a workspace.
claude:
  initialization_command: "/do"
  # dangerously_skip_permissions: false  # Default: false

# Commands to run after a git worktree is created (optional).
# Template variables: ${REPO_ROOT}, ${WORKTREE_PATH}, ${ISSUE_KEY},
#                     ${ISSUE_NUMBER}, ${ISSUE_TITLE}
post_worktree_init:
  - name: "Copy .env"
    run: "cp -n ${REPO_ROOT}/.env ${WORKTREE_PATH}/.env 2>/dev/null || true"
  - name: "Install dependencies"
    run: "cd ${WORKTREE_PATH} && npm install"
    continue_on_error: true

# Terminal application for workspace windows (optional, default: iTerm)
# terminal:
#   app: "iTerm"

# Custom keybindings — run commands from the selected workspace's worktree
keybindings:
  - key: "t"
    name: "Run tests"
    run: "cd ${WORKTREE_PATH} && npm test"
  - key: "l"
    name: "Lint"
    run: "cd ${WORKTREE_PATH} && npm run lint"
  - key: "z"
    name: "Zap PR link"
    run: |
      PR_NUM=$(gh pr list --head ${ISSUE_KEY} --json number -q '.[0].number' 2>/dev/null)
      if [ -n "$PR_NUM" ]; then
        echo "PR #$PR_NUM: $(gh pr list --head ${ISSUE_KEY} --json url -q '.[0].url')"
      fi

profiles:
  # iOS profile — opens Xcode alongside your editor, sets up a QA simulator
  ios-app:
    keywords:
      - ios
      - app
      - mobile
      - swift
    display_name: "iOS App"
    vars:
      IOS_APP_DIR: "ios/MyApp"
      BUNDLE_ID: "com.example.myapp"
      SCHEME: "MyApp"
    github:
      label: "ios"
    links:
      - url: "https://linear.app/my-team/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
      - name: "Xcode"
        path: "${WORKTREE_PATH}/${IOS_APP_DIR}/${SCHEME}.xcodeproj"
        if_set: "IOS_APP_DIR"
    commands:
      - name: "Generate Xcode project"
        run: "cd ${WORKTREE_PATH}/${IOS_APP_DIR} && xcodegen generate"

  # Backend profile — standard server-side workflow
  backend:
    keywords:
      - backend
      - api
      - server
      - database
      - db migration
    display_name: "Backend"
    github:
      label: "backend"
    links:
      - url: "https://linear.app/my-team/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
    commands:
      - name: "Install dependencies"
        run: "cd ${WORKTREE_PATH} && pip install -e '.[dev]'"
        continue_on_error: true

  # Frontend profile — web app development
  frontend:
    keywords:
      - frontend
      - web
      - react
      - ui
    display_name: "Frontend"
    github:
      label: "frontend"
    links:
      - url: "https://linear.app/my-team/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
    commands:
      - name: "Install dependencies"
        run: "cd ${WORKTREE_PATH} && npm install"
        continue_on_error: true
