# .pappardelle.yml — Real-world config for a polyglot monorepo
# (Python FastAPI backends + Swift iOS apps, deployed on AWS)
#
# Place this file at the root of your git repository.
# See pappardelle-config.md for full documentation of all options.
version: 1

# Default profile used when no keyword match is found.
# If a user types "fix the login bug" and no profile keywords match,
# this profile's settings are used.
default_profile: pappardelle

# Team prefix for Linear issues (used when entering bare numbers like '400').
# Pappardelle will prepend this to get 'STA-400'.
team_prefix: STA

# Claude configuration — controls how Claude Code is launched in new workspaces.
claude:
  initialization_command: "/idow"           # Slash command passed to Claude when session opens
  dangerously_skip_permissions: true        # Skip permission prompts (use with caution)

# Commands to run after a git worktree is created.
# Template variables: ${REPO_ROOT}, ${WORKTREE_PATH}, ${ISSUE_KEY},
#                     ${ISSUE_NUMBER}, ${ISSUE_TITLE}
post_workspace_init:
  - name: "Copy .env"
    run: "cp -n ${REPO_ROOT}/.env ${WORKTREE_PATH}/.env 2>/dev/null || true"
  - name: "Set PORT"
    run: "sed -i '' 's/^PORT=.*/PORT=5${ISSUE_NUMBER}/' ${WORKTREE_PATH}/.env"
  - name: "Install dependencies"
    run: "cd ${WORKTREE_PATH} && uv sync --quiet"
    continue_on_error: true

# Drop a space off the rail as soon as Linear flips its issue to Done or Cancelled.
# Same teardown as pressing `d`: pre_workspace_deinit hooks run, the registry +
# tmux sessions are cleaned up, the worktree on disk is left in place.
auto_remove_when_done: true

# Terminal application for workspace windows (default: iTerm)
terminal:
  app: "iTerm"

# Custom keybindings — run bash commands from the selected workspace's worktree.
# These appear in the TUI footer and are triggered by pressing the key.
keybindings:
  - key: "X"
    name: "Open Stardust Xcode project"
    run: "open ${WORKTREE_PATH}/_ios/stardust-jams/stardust-jams.xcodeproj"
  - key: "s"
    name: "Build & deploy Stardust to iPhone"
    run: "cd ${WORKTREE_PATH}/_ios/stardust-jams && xcodegen generate && echo '--worktree ${WORKTREE_PATH}' > /tmp/ios_triggers/stardust-jams"
  - key: "S"
    name: "Build & run Stardust on QA simulator"
    run: "cd ${WORKTREE_PATH}/_ios/stardust-jams && xcodegen generate && xcodebuild -project stardust-jams.xcodeproj -scheme stardust-jams -destination 'platform=iOS Simulator,name=QA-${ISSUE_KEY}' -derivedDataPath DerivedData -quiet build && xcrun simctl boot 'QA-${ISSUE_KEY}' 2>/dev/null; xcrun simctl install 'QA-${ISSUE_KEY}' DerivedData/Build/Products/Debug-iphonesimulator/stardust-jams.app && xcrun simctl launch 'QA-${ISSUE_KEY}' com.cd17822.stardust-jams"

  # ntfy.sh notifications — send push notifications to your phone.
  # ${NTFY_TOPIC} is set in .pappardelle.local.yml (gitignored) to keep topics private.
  - key: "l"
    name: "Zap Linear Issue"
    run: "curl -d '${ISSUE_KEY} Linear Issue' -H 'Click: https://linear.app/stardust-labs/issue/${ISSUE_KEY}' ntfy.sh/${NTFY_TOPIC}"
  - key: "z"
    name: "Zap PR"
    # Use `--search "head:${ISSUE_KEY}"` (tokenized prefix) rather than
    # `--head ${ISSUE_KEY}` (exact match) so follow-up branches like
    # ${ISSUE_KEY}-FOLLOW-1 are still discoverable from the parent issue key.
    # Sort by updatedAt desc so reused branch names surface the PR you're
    # actively working on, not the oldest stale match.
    run: "PR_JSON=$(gh pr list --search \"head:${ISSUE_KEY}\" --state all --json number,url,updatedAt -q 'sort_by(.updatedAt) | reverse | .[0]' 2>/dev/null); PR_NUM=$(echo \"$PR_JSON\" | jq -r '.number // empty'); PR_URL=$(echo \"$PR_JSON\" | jq -r '.url // empty'); if [ -n \"$PR_NUM\" ]; then curl -d \"${ISSUE_KEY} GitHub PR #$PR_NUM\" -H \"Click: $PR_URL\" ntfy.sh/${NTFY_TOPIC}; else REPO_URL=$(gh repo view --json url -q '.url'); curl -d \"${REPO_NAME}\" -H \"Click: $REPO_URL\" ntfy.sh/${NTFY_TOPIC}; fi"

  # GitHub workflow triggers — kick off CI actions from the TUI
  - key: "r"
    name: "Request Claude code review"
    run: "PR_NUM=$(gh pr list --search \"head:${ISSUE_KEY}\" --json number,updatedAt -q 'sort_by(.updatedAt) | reverse | .[0].number') && gh pr edit $PR_NUM --remove-label claude-reviewed 2>/dev/null; gh workflow run claude-code-review.yml -f pr_number=$PR_NUM && gh pr comment $PR_NUM --body '> Code review requested. Workflow triggered.'"

  # Open a new iTerm window for long-running commands
  - key: "P"
    name: "Run pappardelle tests"
    run: |
      osascript -e '
        tell application "iTerm"
          create window with default profile
          tell current session of current window
            write text "cd \"${WORKTREE_PATH}/_dev/scripts/pappardelle\" && npm test"
          end tell
        end tell'

  # send_to_claude — send a slash command to the active Claude session
  - key: "a"
    name: "Address PR feedback"
    send_to_claude: "/address-pr-feedback"
  - key: "f"
    name: "Fix PR pipeline"
    send_to_claude: "/fix-pr-pipeline"
  - key: "c"
    name: "Clear context"
    send_to_claude: "/clear"

profiles:
  # iOS music app — full Xcode + simulator setup
  stardust-jams:
    keywords:
      - stardust
      - jam
      - music
      - spotify
      - playlist
      - album
      - artist
      - recording
    # Linear project routing. Existing issues whose project matches any entry
    # land on this profile. `tracker_projects[0]` is also the default project
    # for issues CREATED under this profile (STA-959): order it so the active
    # project for new work is first.
    tracker_projects:
      - "Stardust Jams Quality"
      - "Stardust Jams MVP"
    display_name: "Stardust Jams"
    emoji: "🎸"                                  # Shown in the ticket rail (STA-924)
    claude:
      initialization_command: "/do-stardust"    # Profile-level override for Claude init
    vars:
      IOS_APP_DIR: "_ios/stardust-jams"
      BUNDLE_ID: "com.cd17822.stardust-jams"
      SCHEME: "stardust-jams"
    github:
      label: "stardust_jams"                    # Auto-applied to PRs created from this profile
    links:
      - url: "https://linear.app/stardust-labs/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"                        # Only shown when PR_URL is available
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
      - name: "Xcode"
        path: "${WORKTREE_PATH}/${IOS_APP_DIR}/${SCHEME}.xcodeproj"
        if_set: "IOS_APP_DIR"
    commands:
      - name: "Generate Xcode project"
        run: "cd ${WORKTREE_PATH}/${IOS_APP_DIR} && xcodegen generate"
      - name: "Create Local.xcconfig"
        run: "printf '// Auto-generated by Pappardelle\\nLOCAL_API_PORT = 5${ISSUE_NUMBER}\\nLOCAL_API_HOST = ${TAILSCALE_IP}\\n' > \"${WORKTREE_PATH}/${IOS_APP_DIR}/Local.xcconfig\""
      - name: "Setup QA simulator"
        run: "${SCRIPT_DIR}/setup-qa-simulator.sh --worktree ${WORKTREE_PATH} --issue-key ${ISSUE_KEY} --ios-app-dir ${IOS_APP_DIR} --bundle-id ${BUNDLE_ID}"
        background: true                        # Runs in the background so other commands can proceed

  # iOS spelling bee game — similar setup, different app
  king-bee:
    keywords:
      - king
      - bee
      - hive
      - spelling
      - wordle
      - puzzle
      - colony
      - guess
    display_name: "King Bee"
    emoji: "🐝"
    claude:
      initialization_command: "/do-king-bee"    # Each profile can have its own Claude init command
    vars:
      IOS_APP_DIR: "_ios/King Bee"
      BUNDLE_ID: "com.cd17822.King-Bee"
      SCHEME: "King Bee"
    github:
      label: "the_hive"
    links:
      - url: "https://linear.app/stardust-labs/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
      - name: "Xcode"
        path: "${WORKTREE_PATH}/${IOS_APP_DIR}/${SCHEME}.xcodeproj"
        if_set: "IOS_APP_DIR"
    commands:
      - name: "Generate Xcode project"
        run: "cd \"${WORKTREE_PATH}/${IOS_APP_DIR}\" && xcodegen generate"
      - name: "Create Local.xcconfig"
        run: "printf '// Auto-generated by Pappardelle\\nLOCAL_API_PORT = 5${ISSUE_NUMBER}\\nLOCAL_API_HOST = ${TAILSCALE_IP}\\n' > \"${WORKTREE_PATH}/${IOS_APP_DIR}/Local.xcconfig\""
      - name: "Setup QA simulator"
        run: "${SCRIPT_DIR}/setup-qa-simulator.sh --worktree ${WORKTREE_PATH} --issue-key ${ISSUE_KEY} --ios-app-dir \"${IOS_APP_DIR}\" --bundle-id ${BUNDLE_ID}"
        background: true

  # Non-iOS profile — for TUI/tooling work (no Xcode, no simulator)
  pappardelle:
    keywords:
      - pappardelle
      - tui
      - idow
      - workspace
    display_name: "Pappardelle"
    emoji: "🍝"
    claude:
      initialization_command: "/do-pappardelle"
    github:
      label: "pappardelle"
    links:
      - url: "https://linear.app/stardust-labs/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
    commands:
      - name: "Install dependencies"
        run: "cd ${WORKTREE_PATH}/_dev/scripts/pappardelle && npm install"
        continue_on_error: true
