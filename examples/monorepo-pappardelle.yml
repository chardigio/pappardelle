# .pappardelle.yml - Pappardelle workspace configuration
# See _dev/scripts/pappardelle/pappardelle-config.md for full documentation
version: 1

# Default profile used when no keyword match is found
default_profile: pappardelle

# Team prefix for Linear issues (used when entering bare numbers like '400')
team_prefix: STA

# Claude initialization command (passed to Claude when opening a new session)
claude:
  initialization_command: "/idow"

# Custom keybindings (run bash commands from the selected workspace's worktree)
keybindings:
  - key: "S"
    name: "Open Stardust Xcode project"
    run: "open ${WORKTREE_PATH}/_ios/stardust-jams/stardust-jams.xcodeproj"
  - key: "I"
    name: "Build & deploy Stardust to iPhone"
    run: "cd ${WORKTREE_PATH}/_ios/stardust-jams && xcodegen generate && echo '--worktree ${WORKTREE_PATH}' > /tmp/ios_triggers/stardust-jams"
  - key: "l"
    name: "Zap Linear Issue"
    run: "curl -d '${ISSUE_KEY} Linear Issue' -H 'Click: https://linear.app/stardust-labs/issue/${ISSUE_KEY}' ntfy.sh/chardigio-zap"
  - key: "z"
    name: "Zap PR"
    run: "curl -d '${ISSUE_KEY} GitHub PR #'$(gh pr list --head ${ISSUE_KEY} --json number -q '.[0].number') -H 'Click: '$(gh pr list --head ${ISSUE_KEY} --json url -q '.[0].url') ntfy.sh/chardigio-zap"
  - key: "r"
    name: "Request Claude code review"
    run: "PR_NUM=$(gh pr list --head ${ISSUE_KEY} --json number -q '.[0].number') && gh pr edit $PR_NUM --remove-label claude-reviewed 2>/dev/null; gh workflow run claude-code-review.yml -f pr_number=$PR_NUM"
  - key: "a"
    name: "Address PR feedback"
    send_to_claude: "/address-pr-feedback"
  - key: "c"
    name: "Clear Claude context"
    send_to_claude: "/clear"

# Lifecycle hooks
hooks:
  post_workspace_create:
    - name: "Organize aerospace workspace"
      run: "${SCRIPT_DIR}/organize-aerospace.sh ${ISSUE_KEY}"
      continue_on_error: true

profiles:
  stardust-jams:
    keywords:
      - stardust
      - jams
      - music
      - spotify
      - playlist
      - album
      - artist
      - track
      - recording
    display_name: "Stardust Jams"
    ios:
      app_dir: "_ios/stardust-jams"
      bundle_id: "com.cd17822.stardust-jams"
      scheme: "stardust-jams"
    github:
      label: "stardust_jams"
    links:
      - url: "https://linear.app/stardust-labs/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
      - name: "Xcode"
        path: "${XCODEPROJ_PATH}"
        if_set: "XCODEPROJ_PATH"
    commands:
      - name: "Generate Xcode project"
        run: "cd ${WORKTREE_PATH}/${IOS_APP_DIR} && xcodegen generate"
      - name: "Setup QA simulator"
        run: "${SCRIPT_DIR}/setup-qa-simulator.sh --worktree ${WORKTREE_PATH} --issue-key ${ISSUE_KEY} --ios-app-dir ${IOS_APP_DIR} --bundle-id ${BUNDLE_ID}"
        background: true

