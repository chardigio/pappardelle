# .pappardelle.yml - Pappardelle workspace configuration
# See _dev/scripts/pappardelle/pappardelle-config.md for full documentation
version: 1

# Default profile used when no keyword match is found
default_profile: pappardelle

# Team prefix for Linear issues (used when entering bare numbers like '400')
team_prefix: STA

# Claude configuration
claude:
  initialization_command: "/idow"
  dangerously_skip_permissions: true

# Commands to run after git worktree is created (optional).
# Without this section, create-worktree.sh just creates the branch.
# Uses the same CommandConfig format as profile commands.
post_worktree_init:
  - name: "Copy .env"
    run: "cp -n ${REPO_ROOT}/.env ${WORKTREE_PATH}/.env 2>/dev/null || true"
  - name: "Set PORT"
    run: "sed -i '' 's/^PORT=.*/PORT=5${ISSUE_NUMBER}/' ${WORKTREE_PATH}/.env"
  - name: "Install dependencies"
    run: "cd ${WORKTREE_PATH} && uv sync --quiet"
    continue_on_error: true

# Terminal application for workspace windows
terminal:
  app: "iTerm"

# Custom keybindings (run bash commands from the selected workspace's worktree)
keybindings:
  - key: "X"
    name: "Open Stardust Xcode project"
    run: "open ${WORKTREE_PATH}/_ios/stardust-jams/stardust-jams.xcodeproj"
  - key: "s"
    name: "Build & deploy Stardust to iPhone"
    run: "cd ${WORKTREE_PATH}/_ios/stardust-jams && xcodegen generate && echo '--worktree ${WORKTREE_PATH}' > /tmp/ios_triggers/stardust-jams"
  - key: "S"
    name: "Build & run Stardust on QA simulator"
    run: "cd ${WORKTREE_PATH}/_ios/stardust-jams && xcodegen generate && xcodebuild -project stardust-jams.xcodeproj -scheme stardust-jams -destination 'platform=iOS Simulator,name=QA-${ISSUE_KEY}' -derivedDataPath DerivedData -quiet build && xcrun simctl install 'QA-${ISSUE_KEY}' DerivedData/Build/Products/Debug-iphonesimulator/stardust-jams.app && xcrun simctl launch 'QA-${ISSUE_KEY}' com.cd17822.stardust-jams"
  - key: "l"
    name: "Zap Linear Issue"
    run: "curl -d '${ISSUE_KEY} Linear Issue' -H 'Click: https://linear.app/stardust-labs/issue/${ISSUE_KEY}' ntfy.sh/chardigio-zap"
  - key: "z"
    name: "Zap PR"
    run: "curl -d '${ISSUE_KEY} GitHub PR #'$(gh pr list --head ${ISSUE_KEY} --json number -q '.[0].number') -H 'Click: '$(gh pr list --head ${ISSUE_KEY} --json url -q '.[0].url') ntfy.sh/chardigio-zap"
  - key: "r"
    name: "Request Claude code review"
    run: "PR_NUM=$(gh pr list --head ${ISSUE_KEY} --json number -q '.[0].number') && gh pr edit $PR_NUM --remove-label claude-reviewed 2>/dev/null; gh workflow run claude-code-review.yml -f pr_number=$PR_NUM && gh pr comment $PR_NUM --body '> Code review requested. Workflow triggered.'"
  - key: "a"
    name: "Address PR feedback"
    send_to_claude: "/address-pr-feedback"
  - key: "c"
    name: "Clear Claude context"
    send_to_claude: "/clear"

profiles:
  stardust-jams:
    keywords:
      - stardust
      - jams
      - music
      - spotify
      - playlist
      - album
      - artist
      - recording
    display_name: "Stardust Jams"
    vars:
      IOS_APP_DIR: "_ios/stardust-jams"
      BUNDLE_ID: "com.cd17822.stardust-jams"
      SCHEME: "stardust-jams"
    github:
      label: "stardust_jams"
    links:
      - url: "https://linear.app/stardust-labs/issue/${ISSUE_KEY}"
        title: "Linear Issue"
      - url: "${PR_URL}"
        title: "GitHub PR"
        if_set: "PR_URL"
    apps:
      - name: "Cursor"
        path: "${WORKTREE_PATH}"
      - name: "Xcode"
        path: "${WORKTREE_PATH}/${IOS_APP_DIR}/${SCHEME}.xcodeproj"
        if_set: "IOS_APP_DIR"
    commands:
      - name: "Generate Xcode project"
        run: "cd ${WORKTREE_PATH}/${IOS_APP_DIR} && xcodegen generate"
      - name: "Create Local.xcconfig"
        run: "printf '// Auto-generated by Pappardelle\\nLOCAL_API_PORT = 5${ISSUE_NUMBER}\\nLOCAL_API_HOST = 100.69.3.88\\n' > \"${WORKTREE_PATH}/${IOS_APP_DIR}/Local.xcconfig\""
      - name: "Setup QA simulator"
        run: "${SCRIPT_DIR}/setup-qa-simulator.sh --worktree ${WORKTREE_PATH} --issue-key ${ISSUE_KEY} --ios-app-dir ${IOS_APP_DIR} --bundle-id ${BUNDLE_ID}"
        background: true

