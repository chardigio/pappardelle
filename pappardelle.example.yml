# .pappardelle.yml - Pappardelle workspace configuration
# Place this file at the root of your git repository.
# See pappardelle-config.md for full documentation.
version: 1

# Default profile used when no keyword match is found
default_profile: backend

# Default emoji shown in the ticket rail when no per-profile `emoji:` is set,
# or when a workspace can't be matched to a profile (e.g. main worktree).
# Empty string = "reserve the slot but render nothing in it" so emoji-less
# rows still align with their emoji-bearing siblings.
#
# Optional. If you set `emoji:` on at least one profile and omit this key,
# Pappardelle auto-promotes unmatched rows to a blank-reserved slot for
# you. If no profile has `emoji:` anywhere, the TUI looks identical to
# pre-emoji Pappardelle (no slot rendered).
default_emoji: ''

# Team prefix for Linear issues (e.g., 'ENG' for 'ENG-123')
team_prefix: ENG

# Issue tracker (optional). Linear is assumed when omitted.
# For Jira, you can set `default_issue_type` if your project doesn't accept the
# default of "Task" — and override it per-profile via `profiles.<name>.jira.issue_type`.
# issue_tracker:
#   provider: jira
#   base_url: https://mycompany.atlassian.net
#   default_issue_type: Task

# Claude configuration (optional)
# claude:
#   initialization_command: "/idow"        # Command passed to Claude when a new session opens
#   dangerously_skip_permissions: false     # Pass --dangerously-skip-permissions to Claude (default: false)

# Auto-remove spaces from the rail when the tracker reports their issue as
# completed or canceled. Same teardown as pressing `d` (runs pre_workspace_deinit,
# unregisters the space, kills tmux); the on-disk worktree is left alone.
# Off by default.
# auto_remove_when_done: true

# Issue watchlist (optional): poll the tracker every 30s and auto-spawn a
# workspace for each assigned, matching issue that doesn't already have one.
# A profile can also declare its own `issue_watchlist` (see ios-app below) —
# profile watchlists are polled IN ADDITION to this top-level one.
# issue_watchlist:
#   assignee: me            # 'me' auto-detects; or an explicit username/email; omit to match all
#   statuses:
#     - To Do
#     - In Progress
#   labels:                 # Optional: only watch issues carrying one of these labels
#     - pappardelle
#   key_prefixes:           # Optional: only watch these key prefixes (e.g. ENG-*, not WAB-*)
#     - ENG

# Command run in the companion pane (the right pane, next to Claude).
# Defaults to gitui. Set it to any shell command — a different git UI, a dev
# server, a log tailer, etc. — or "" to leave a plain shell. A profile can
# override this (see profiles below). Restore the old default with `lazygit`.
# companion_command: gitui
#
# Compose two tools in one pane by splitting it first — e.g. gitui on top
# (focused) + a plain shell below, 70/30 (gitui bigger). The split runs in the
# companion's own tmux session, so it never touches the Claude pane. `-v` stacks
# below, `-d` keeps gitui focused, `-l 30%` sizes the bottom shell (gitui keeps
# 70%), `-c "#{pane_current_path}"` opens it in the worktree dir:
# companion_command: 'tmux split-window -v -d -l 30% -c "#{pane_current_path}"; GIT_OPTIONAL_LOCKS=0 gitui'

# Commands to run after git worktree is created (optional).
# Without this section, create-worktree.sh just creates the branch.
# Uses the same CommandConfig format as profile commands.
# Template variables (${REPO_ROOT}, ${WORKTREE_PATH}, ${ISSUE_NUMBER}, etc.) are expanded.
# Note: `post_worktree_init` is also accepted for backwards compatibility.
post_workspace_init:
  - name: 'Copy .env'
    run: 'cp -n ${REPO_ROOT}/.env ${WORKTREE_PATH}/.env 2>/dev/null || true'
  - name: 'Install dependencies'
    run: 'cd ${WORKTREE_PATH} && npm install'
    continue_on_error: true

# Commands to run before workspace deletion (optional).
# If any command fails (without continue_on_error), the deletion is aborted.
# pre_workspace_deinit:
#   - name: "Close issue"
#     run: "linctl issue update ${ISSUE_KEY} --state Done"
#     continue_on_error: true
#   - name: "Remove worktree"
#     run: "git worktree remove ${WORKTREE_PATH} --force"
#     continue_on_error: true

# Terminal application for workspace windows (optional, default: iTerm)
# terminal:
#   app: "iTerm"

# Lifecycle hooks (optional)
# hooks:
#   post_workspace_create:
#     - name: "Run project setup"
#       run: "cd ${WORKTREE_PATH} && ./setup.sh"
#       continue_on_error: true

profiles:
  ios-app:
    keywords:
      - ios
      - app
      - mobile
      - swift
    # Linear project names that map to this profile. Existing issues fetched
    # by key are routed here when their project matches (case-insensitive).
    # On Linear, `tracker_projects[0]` is also the default project for issues
    # CREATED under this profile (e.g. via `idow "fix login bug"`). Reorder
    # this list so the project where new work should land is first.
    tracker_projects:
      - 'iOS App Quality'
      - 'iOS App MVP'
    display_name: 'iOS App'
    # Optional emoji shown in the ticket rail (left of the Claude status icon).
    # Falls back to top-level `default_emoji` when omitted.
    emoji: '📱'
    # Per-profile team prefix override (optional).
    # Issues created under this profile will use this prefix instead of the global one.
    # team_prefix: IOS
    # Per-profile issue watchlist (optional), polled in ADDITION to the
    # top-level one. Watch a bespoke status just for this project's issues.
    # When key_prefixes is omitted it's auto-scoped to this profile's
    # team_prefix (IOS here, else the global ENG), so it only pulls in that
    # team's issues. Workspaces it spawns are forced to this profile.
    # issue_watchlist:
    #   assignee: me
    #   statuses:
    #     - For Pappardelle
    # Per-profile Jira issue type override (optional).
    # Falls back to issue_tracker.default_issue_type, then "Task".
    # jira:
    #   issue_type: Feature
    vars:
      IOS_APP_DIR: 'ios/MyApp'
      BUNDLE_ID: 'com.example.myapp'
      SCHEME: 'MyApp'
    github:
      label: 'ios'
    links:
      - url: 'https://linear.app/my-team/issue/${ISSUE_KEY}'
        title: 'Linear Issue'
      - url: '${PR_URL}'
        title: 'GitHub PR'
        if_set: 'PR_URL'
    apps:
      - name: 'Cursor'
        path: '${WORKTREE_PATH}'
      - name: 'Xcode'
        path: '${WORKTREE_PATH}/${IOS_APP_DIR}/${SCHEME}.xcodeproj'
        if_set: 'IOS_APP_DIR'
    commands:
      - name: 'Generate Xcode project'
        run: 'cd ${WORKTREE_PATH}/${IOS_APP_DIR} && xcodegen generate'

  backend:
    keywords:
      - backend
      - api
      - server
      - database
      - db migration # Multi-word keywords match adjacent words in the input
    display_name: 'Backend'
    emoji: '⚙️'
    # Per-profile companion-pane command. Overrides the top-level
    # `companion_command` — e.g. boot the API server instead of a git UI.
    # companion_command: 'make run'
    github:
      label: 'backend'
    links:
      - url: 'https://linear.app/my-team/issue/${ISSUE_KEY}'
        title: 'Linear Issue'
      - url: '${PR_URL}'
        title: 'GitHub PR'
        if_set: 'PR_URL'
    apps:
      - name: 'Cursor'
        path: '${WORKTREE_PATH}'

  frontend:
    keywords:
      - frontend
      - web
      - react
      - ui
    display_name: 'Frontend'
    emoji: '🎨'
    github:
      label: 'frontend'
    links:
      - url: 'https://linear.app/my-team/issue/${ISSUE_KEY}'
        title: 'Linear Issue'
      - url: '${PR_URL}'
        title: 'GitHub PR'
        if_set: 'PR_URL'
    apps:
      - name: 'Cursor'
        path: '${WORKTREE_PATH}'
    commands:
      - name: 'Install dependencies'
        run: 'cd ${WORKTREE_PATH} && npm install'
        continue_on_error: true
