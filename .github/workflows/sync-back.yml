name: Sync Back to Monorepo

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-back:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check for forward-sync commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only the head commit is checked because forward sync pushes directly
          # to main (not via PR), so the only PRs with [sync] in their head commit
          # would be edge cases like cherry-picks of forward-synced commits.
          HEAD_MSG=$(gh api /repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }} --jq '.commit.message')
          if echo "$HEAD_MSG" | grep -qF '[sync]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: PR contains forward-sync commits"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Sync changes to monorepo
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          STARDUST_LABS_PAT: ${{ secrets.STARDUST_LABS_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$STARDUST_LABS_PAT" ]; then
            echo "::error::STARDUST_LABS_PAT secret is not set. Cannot sync back to monorepo."
            exit 1
          fi

          # Get original author info from the PR's head commit
          AUTHOR_NAME=$(gh api /repos/${{ github.repository }}/commits/$HEAD_SHA --jq '.commit.author.name')
          AUTHOR_EMAIL=$(gh api /repos/${{ github.repository }}/commits/$HEAD_SHA --jq '.commit.author.email')

          # Get the PR diff
          gh pr diff "$PR_NUMBER" > /tmp/pr.diff

          if [ ! -s /tmp/pr.diff ]; then
            echo "Empty diff, nothing to sync"
            exit 0
          fi

          # Clone stardust-labs monorepo (shallow)
          git clone --depth=1 "https://x-access-token:${STARDUST_LABS_PAT}@github.com/stardust-labs-io/stardust-labs.git" /tmp/monorepo
          cd /tmp/monorepo

          # Apply the diff under the pappardelle directory
          git apply --directory=_dev/scripts/pappardelle /tmp/pr.diff || {
            echo "::error::git apply failed — the monorepo may have diverged. See _docs/2026-03-11-pappardelle-bidirectional-sync.md for manual fallback steps."
            exit 1
          }

          # Commit with original author attribution
          git config user.name "pappardelle-sync[bot]"
          git config user.email "pappardelle-sync[bot]@users.noreply.github.com"

          git add -A
          GIT_AUTHOR_NAME="$AUTHOR_NAME" \
          GIT_AUTHOR_EMAIL="$AUTHOR_EMAIL" \
          git commit -m "[sync-back] $PR_TITLE (chardigio/pappardelle#$PR_NUMBER)"

          git push origin master
          echo "Successfully synced PR #$PR_NUMBER to stardust-labs monorepo"
